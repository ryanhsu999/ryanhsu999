<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Dropdown</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
      }

      .navbar {
        display: flex;
        justify-content: center;
        padding: 15px;
        background: #f5f5f7;
      }

      .nav-item {
        position: relative;
        cursor: pointer;
      }

      /* Hidden by default */
      .dropdown {
        position: absolute;
        top: 40px;
        left: 0;
        width: 800px;
        background: white;
        padding: 30px;
        display: none;
        gap: 50px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      /* ONLY opens when active */
      .nav-item.active .dropdown {
        display: flex;
      }

      .column h3 {
        font-size: 14px;
        color: gray;
      }

      .column a {
        display: block;
        text-decoration: none;
        color: black;
        margin: 8px 0;
      }

      /* ONLY opens when active */
      .nav-item.active .dropdown {
        display: flex;
      }

      .column h3 {
        font-size: 14px;
        color: gray;
      }

      .column a {
        display: block;
        text-decoration: none;
        color: black;
        margin: 8px 0;
      }
    </style>

  </head>

  <body>

    <div class="navbar">
      <div class="nav-item" id="iphoneBtn">
        iPhone

        <div class="dropdown">
          <div class="column">
            <h3>Explore</h3>
            <a href="#">iPhone 17</a>
            <a href="#">iPhone 16</a>
          </div>

          <div class="column">
            <h3>Shop</h3>
            <a href="#">Buy iPhone</a>
            <a href="#">Accessories</a>
          </div>
        </div>

      </div>
    </div>



    <script>
      const btn = document.getElementById("iphoneBtn");

      // Toggle on click
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        btn.classList.toggle("active");
      });

      // Close when clicking outside
      document.addEventListener("click", function () {
        btn.classList.remove("active");
      });
    </script>

  </body>

</html>
